services:
  postgres:
    image: postgres:16
    container_name: backflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: backflow
      POSTGRES_PASSWORD: backflow
      POSTGRES_DB: backflow_compliance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backflow -d backflow_compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: backflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: backflow-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/backflow-compliance || true;
      mc anonymous set download local/backflow-compliance || true;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
